name: broken-link-checker

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * 5'

jobs:
  linkChecker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Broken Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # root-dir resolves root-relative links (/assets/...) against the
          # docs source; theme templates and the page template are rendered
          # into full pages at build time so their /-links can't resolve here
          # UISP help pages serve 403 responses to automated link checkers.
          args: >-
            --verbose --no-progress
            --root-dir "$GITHUB_WORKSPACE/docs"
            --exclude-path theme
            --exclude-path template.md
            --exclude '^https://help\.uisp\.com/'
            './**/*.md' './**/*.html' './**/*.rst'
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

      - name: Create Issue From File
        if: ${{ steps.lychee.outputs.exit_code != 0 }}
        uses: peter-evans/create-issue-from-file@v6
        with:
          title: Link Checker Report
          content-filepath: ./lychee/out.md
          labels: report, automated issue
